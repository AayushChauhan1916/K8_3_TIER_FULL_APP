apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "db.name" . }}
spec:
  serviceName: {{ include "db.serviceName" . }}
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: {{ include "db.name" . }}

  template:
    metadata:
      labels:
        app: {{ include "db.name" . }}
    spec:
      containers:
        - name: mongo
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command:
            - mongod
            - "--replSet"
            - "rs0"
            - "--bind_ip_all"

          ports:
            - containerPort: {{ include "db.port" . }}

          volumeMounts:
            - name: mongo-data
              mountPath: /data/db

          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    sleep 10

                    if hostname | grep -q "{{ include "db.name" . }}-0"; then
                      mongosh <<EOF
                      rs.initiate({
                        _id: "rs0",
                        members: [
                          { _id: 0, host: "{{ include "db.name" . }}-0.{{ include "db.serviceName" . }}:{{ include "db.port" . }}" },
                          { _id: 1, host: "{{ include "db.name" . }}-1.{{ include "db.serviceName" . }}:{{ include "db.port" . }}" },
                          { _id: 2, host: "{{ include "db.name" . }}-2.{{ include "db.serviceName" . }}:{{ include "db.port" . }}" }
                        ]
                      })
                      EOF
                    fi

  volumeClaimTemplates:
    - metadata:
        name: mongo-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.persistence.size }}