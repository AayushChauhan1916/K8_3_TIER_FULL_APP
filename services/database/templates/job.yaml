apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "db.name" . }}-rs-init
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure

      containers:
        - name: mongo-init
          image: mongo:7
          command:
            - /bin/sh
            - -c
            - |
              set -e

              PRIMARY="{{ include "db.name" . }}-0.{{ include "db.serviceName" . }}:{{ include "db.port" . }}"

              echo "🚀 Waiting for ALL Mongo pods..."

              for i in $(seq 0 {{ sub .Values.replicaCount 1 }}); do
                HOST="{{ include "db.name" . }}-$i.{{ include "db.serviceName" . }}:{{ include "db.port" . }}"

                echo "⏳ Waiting for $HOST..."

                until mongosh --host $HOST --eval "db.adminCommand('ping')" >/dev/null 2>&1; do
                  sleep 3
                done

                echo "✅ $HOST is ready"
              done

              echo "⏳ Waiting for primary availability..."

              until mongosh --host $PRIMARY --eval "db.adminCommand('ping')" >/dev/null 2>&1; do
                sleep 2
              done

              echo "🔍 Checking if replica set already initialized..."

              INIT_STATUS=$(mongosh --host $PRIMARY --quiet --eval "
                try {
                  rs.status().ok
                } catch (e) {
                  0
                }
              ")

              if [ "$INIT_STATUS" != "1" ]; then
                echo "⚙️ Initializing replica set..."

                mongosh --host $PRIMARY --eval "
                  rs.initiate({
                    _id: 'rs0',
                    members: [
                      { _id: 0, host: '$PRIMARY' }
                    ]
                  })
                "

                echo "⏳ Waiting for primary to stabilize..."
                sleep 5
              else
                echo "✅ Replica set already initialized"
              fi

              echo "➕ Ensuring all members are added..."

              for i in $(seq 1 {{ sub .Values.replicaCount 1 }}); do
                HOST="{{ include "db.name" . }}-$i.{{ include "db.serviceName" . }}:{{ include "db.port" . }}"

                echo "🔍 Checking $HOST..."

                EXISTS=$(mongosh --host $PRIMARY --quiet --eval "
                  rs.status().members.some(m => m.name === '$HOST')
                ")

                if [ "$EXISTS" != "true" ]; then
                  echo "➕ Adding $HOST"

                  mongosh --host $PRIMARY --eval "
                    rs.add('$HOST')
                  "

                  sleep 2
                else
                  echo "✅ $HOST already part of replica set"
                fi
              done

              echo "⏳ Waiting for replica set to become healthy..."

              until mongosh --host $PRIMARY --quiet --eval "
                rs.status().members.filter(m => m.stateStr === 'SECONDARY' || m.stateStr === 'PRIMARY').length >= {{ .Values.replicaCount }}
              " | grep true; do
                sleep 3
              done

              echo "🎉 Replica set fully configured and healthy!"