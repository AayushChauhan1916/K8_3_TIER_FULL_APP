global:
  name: nivashub-backend
  environment: dev

replicaCount: 2

image:
  repository: dokcer.io/ishan420/nest-backend
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 3000

containerPort: 3000

resources:
  limits:
    cpu: '500m'
    memory: '512Mi'
  requests:
    cpu: '200m'
    memory: '256Mi'

env:
  - name: NODE_ENV
    value: dev

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
